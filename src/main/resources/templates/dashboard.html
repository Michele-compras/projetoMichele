<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>

<div class="main-content">
<div class="container-fluid p-4">
    <h2 class="mb-4">Dashboard</h2>


    <!-- Tabela comparativa por Coleção -->
    <div class="card border-0 shadow-sm mb-4" th:if="${!#lists.isEmpty(colecaoLabels)}">
        <div class="card-header bg-dark text-white">
            <strong>Resumo Comparativo por Coleção</strong>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-sm table-bordered table-hover mb-0" style="font-size:0.82rem;">
                    <thead>
                        <tr class="table-secondary text-center">
                            <th rowspan="2" class="align-middle text-start ps-3" style="min-width:130px">Coleção</th>
                            <!-- Fichas -->
                            <th colspan="4" class="border-start border-2">Fichas</th>
                            <!-- Amostra Cor -->
                            <th colspan="3" class="border-start border-2">Amostra Cor/Qualidade</th>
                            <!-- Amostra Embarque -->
                            <th colspan="3" class="border-start border-2">Amostra Embarque</th>
                            <!-- Por Fornecedor -->
                            <th th:colspan="${fornecedores.size()}" class="border-start border-2">Por Fornecedor</th>
                        </tr>
                        <tr class="table-light text-center" style="font-size:0.75rem;">
                            <!-- Fichas -->
                            <th class="border-start border-2 fw-bold">Total</th>
                            <th class="text-primary">Tecidos</th>
                            <th class="text-info">Av. Metro</th>
                            <th class="text-info">Av. Unidade</th>
                            <!-- Amostra Cor -->
                            <th class="border-start border-2 text-warning">Aguardando</th>
                            <th class="text-success">Aprovada</th>
                            <th class="text-danger">Reprovada</th>
                            <!-- Amostra Embarque -->
                            <th class="border-start border-2 text-warning">Aguardando</th>
                            <th class="text-success">Aprovada</th>
                            <th class="text-danger">Reprovada</th>
                            <!-- Por Fornecedor -->
                            <th th:each="forn : ${fornecedores}" class="border-start text-secondary"
                                th:text="${forn}" style="min-width:90px; white-space:normal;"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="i : ${#numbers.sequence(0, colecaoLabels.size() - 1)}" class="text-center">
                            <td class="text-start ps-3 fw-bold" th:text="${colecaoLabels[i]}"></td>
                            <!-- Fichas -->
                            <td class="border-start border-2 fw-bold" th:text="${colecaoValues[i]}"></td>
                            <td class="text-primary fw-bold" th:text="${colecaoTecidoValues[i]}"></td>
                            <td class="text-info fw-bold" th:text="${colecaoAcessorioMetroValues[i]}"></td>
                            <td class="text-info fw-bold" th:text="${colecaoAcessorioUnidadeValues[i]}"></td>
                            <!-- Amostra Cor -->
                            <td class="border-start border-2 text-warning fw-bold" th:text="${colecaoCorPendente[i]}"></td>
                            <td class="text-success fw-bold" th:text="${colecaoCorAprovado[i]}"></td>
                            <td class="text-danger fw-bold" th:text="${colecaoCorReprovado[i]}"></td>
                            <!-- Amostra Embarque -->
                            <td class="border-start border-2 text-warning fw-bold" th:text="${colecaoProdPendente[i]}"></td>
                            <td class="text-success fw-bold" th:text="${colecaoProdAprovado[i]}"></td>
                            <td class="text-danger fw-bold" th:text="${colecaoProdReprovado[i]}"></td>
                            <!-- Por Fornecedor -->
                            <td th:each="forn : ${fornecedores}" class="border-start text-secondary fw-bold"
                                th:text="${colecaoFornecedorMap[forn][i]}"></td>
                        </tr>
                    </tbody>
                    <tfoot class="table-secondary fw-bold text-center">
                        <tr>
                            <td class="text-start ps-3">TOTAL</td>
                            <td class="border-start border-2" th:text="${total}"></td>
                            <td th:text="${qtdTecido}"></td>
                            <td th:text="${qtdAcessorioMetro}"></td>
                            <td th:text="${qtdAcessorioUnidade}"></td>
                            <td class="border-start border-2 text-warning" th:text="${corPendente}"></td>
                            <td class="text-success" th:text="${corAprovado}"></td>
                            <td class="text-danger" th:text="${corReprovado}"></td>
                            <td class="border-start border-2 text-warning" th:text="${prodPendente}"></td>
                            <td class="text-success" th:text="${prodAprovado}"></td>
                            <td class="text-danger" th:text="${prodReprovado}"></td>
                            <!-- Por Fornecedor -->
                            <td th:each="forn : ${fornecedores}" class="border-start text-secondary"
                                th:text="${fornecedorTotais[forn]}"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>



</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
