<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Pedidos')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<style>
    .tabela-aprovacao th {
        white-space: normal !important;
        font-size: 0.75rem;
        vertical-align: middle;
        text-align: center;
        padding: 4px 6px;
    }
    .tabela-aprovacao td {
        font-size: 0.78rem;
        vertical-align: middle;
        padding: 3px 6px;
    }
    .tabela-aprovacao th.col-descricao,
    .tabela-aprovacao td.col-descricao { max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>

<div class="main-content">
<div class="container-fluid p-3">
    <h2>Pedidos</h2>

    <!-- Filtros -->
    <div class="card mb-3 no-print">
        <div class="card-body">
            <form th:action="@{/pedidos}" method="get">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Coleção</label>
                        <input type="text" class="form-control form-control-sm" name="colecao"
                               th:value="${colecaoFiltro}" placeholder="Buscar por coleção...">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Tipo</label>
                        <select class="form-select form-select-sm" name="tipo">
                            <option value="">Todos</option>
                            <option th:each="t : ${tipos}" th:value="${t}" th:text="${t.descricao}"
                                    th:selected="${tipoSelecionado != null and tipoSelecionado == t}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Status Pedido</label>
                        <select class="form-select form-select-sm" name="statusPedido">
                            <option value="">Todos</option>
                            <option th:each="s : ${statusPedidoList}" th:value="${s}" th:text="${s.descricao}"
                                    th:selected="${statusPedidoSelecionado != null and statusPedidoSelecionado == s}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Data Início</label>
                        <input type="date" class="form-control form-control-sm" name="dataInicio"
                               th:value="${dataInicio}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Data Fim</label>
                        <input type="date" class="form-control form-control-sm" name="dataFim"
                               th:value="${dataFim}">
                    </div>
                    <div class="col-md-1">
                        <button type="submit" class="btn btn-sm btn-primary w-100">Filtrar</button>
                    </div>
                    <div class="col-md-auto">
                        <a th:href="@{/pedidos}" class="btn btn-sm btn-outline-secondary">Limpar</a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Quantidade por Coleção -->
    <div class="card mb-3 no-print" th:if="${!#maps.isEmpty(qtdPorColecao)}">
        <div class="card-header"><strong>Quantidade total por Coleção</strong></div>
        <div class="card-body p-2">
            <div class="d-flex flex-wrap gap-2">
                <span th:each="entry : ${qtdPorColecao}"
                      class="badge rounded-pill bg-primary fs-6 px-3 py-2">
                    <span th:text="${entry.key}"></span>
                    <span class="ms-2 badge bg-light text-dark" th:text="${entry.value}"></span>
                </span>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover table-sm tabela-aprovacao">
            <thead class="table-dark">
                <tr>
                    <th style="width:48px">Foto</th>
                    <th>Coleção</th>
                    <th>Tipo</th>
                    <th>Categoria</th>
                    <th class="col-descricao">Descrição</th>
                    <th>Fornecedor</th>
                    <th>Marca</th>
                    <th>Cor</th>
                    <th>Ref. Tex.</th>
                    <th>Ref. Forn.</th>
                    <th>Nº Pedido</th>
                    <th>Dt. Pedido</th>
                    <th>Qtd.</th>
                    <th>Mín. Compra</th>
                    <th>Preço USD</th>
                    <th>Preço R$</th>
                    <th class="no-print">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="ficha : ${fichas}">
                    <td>
                        <img th:if="${ficha.fotoPath != null}" th:src="@{'/uploads/' + ${ficha.fotoPath}}"
                             alt="Foto" style="width:36px; height:36px; object-fit:cover; border-radius:4px;">
                        <span th:if="${ficha.fotoPath == null}" class="text-muted">-</span>
                    </td>
                    <td th:text="${ficha.colecao}"></td>
                    <td th:text="${ficha.tipo.descricao}"></td>
                    <td th:text="${ficha.categoriaProduto}"></td>
                    <td class="col-descricao" th:text="${ficha.descricao}" th:title="${ficha.descricao}"></td>
                    <td th:text="${ficha.fornecedor}"></td>
                    <td th:text="${ficha.marca}"></td>
                    <td th:text="${ficha.cor}"></td>
                    <td th:text="${ficha.referencia}"></td>
                    <td th:text="${ficha.refFornecedor}"></td>
                    <td th:text="${ficha.numeroPedido}"></td>
                    <td th:text="${ficha.dataColocacaoPedido != null ? #temporals.format(ficha.dataColocacaoPedido, 'dd/MM/yyyy') : ''}"></td>
                    <td th:text="${ficha.quantidadeComprada != null ? ficha.quantidadeComprada : ''}"></td>
                    <td th:text="${ficha.minimoCompra != null ? ficha.minimoCompra : ''}"></td>
                    <td th:text="${ficha.precoUsd != null ? '$ ' + #numbers.formatDecimal(ficha.precoUsd, 1, 2) : ''}"></td>
                    <td th:text="${ficha.precoReais != null ? 'R$ ' + #numbers.formatDecimal(ficha.precoReais, 1, 2) : ''}"></td>
                    <td class="no-print">
                        <a th:href="@{/fichas/visualizar/{id}(id=${ficha.id})}" class="btn btn-sm btn-info">Ver</a>
                        <a th:href="@{/fichas/editar/{id}(id=${ficha.id})}" class="btn btn-sm btn-warning">Editar</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(fichas)}">
                    <td colspan="17" class="text-center text-muted">Nenhum pedido encontrado.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
