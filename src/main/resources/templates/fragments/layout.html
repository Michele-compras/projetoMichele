<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="header(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Ficha Técnica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { font-size: 12pt; }
            .main-content { margin-left: 0 !important; }
        }
        .campo-gramatura { transition: all 0.3s; }
        .table th { white-space: nowrap; }

        /* Sidebar */
        #sidebar {
            width: 230px;
            min-height: 100vh;
            background-color: #1a1a2e;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        #sidebar .sidebar-brand {
            padding: 20px 16px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        #sidebar .sidebar-brand span {
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
            display: block;
        }
        #sidebar .sidebar-brand small {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        #sidebar .nav-section {
            padding: 14px 16px 4px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.35);
            font-weight: 600;
        }
        #sidebar .nav-link {
            color: rgba(255,255,255,0.75);
            padding: 9px 16px;
            border-radius: 6px;
            margin: 2px 8px;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.15s, color 0.15s;
        }
        #sidebar .nav-link:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        #sidebar .nav-link.active {
            background: #0d6efd;
            color: #fff;
        }
        #sidebar .nav-link i {
            font-size: 1rem;
            width: 18px;
            text-align: center;
        }

        /* Main content offset */
        .main-content {
            margin-left: 230px;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>
<nav th:fragment="sidebar" id="sidebar" class="no-print">
    <div class="sidebar-brand">
        <span>Sistema de Ficha Técnica</span>
        <small>Importados</small>
    </div>

    <div class="nav-section">Principal</div>
    <a class="nav-link" th:href="@{/dashboard}">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a class="nav-link" th:href="@{/quadro-planejamento}">
        <i class="bi bi-table"></i> Cotado/Aprovado/Cancelado por Coleção
    </a>
    <a class="nav-link" th:href="@{/quadro-compras}">
        <i class="bi bi-bag-check"></i> Comprado por Tipo e Metragem
    </a>

    <div class="nav-section">Fichas</div>
    <a class="nav-link" th:href="@{/fichas}">
        <i class="bi bi-card-list"></i> Todas as Fichas
    </a>
    <a class="nav-link" th:href="@{/fichas/nova}">
        <i class="bi bi-plus-circle"></i> Nova Ficha
    </a>

    <div class="nav-section">Pedidos</div>
    <a class="nav-link" th:href="@{/pedidos}">
        <i class="bi bi-bag-check"></i> Pedidos
    </a>
    <a class="nav-link" th:href="@{/aprovacao-cor}">
        <i class="bi bi-patch-check"></i> Aprovação Cor/Qualidade
    </a>
    <a class="nav-link" th:href="@{/aprovacao-embarque}">
        <i class="bi bi-ship"></i> Aprovação Amostra Produção
    </a>

    <div class="nav-section">Importação</div>
    <a class="nav-link" th:href="@{/importar}">
        <i class="bi bi-file-earmark-excel"></i> Importar Excel
    </a>
</nav>
</body>
</html>
