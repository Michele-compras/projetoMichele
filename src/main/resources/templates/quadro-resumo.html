<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header('Resumo de Planejamento')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>

<div class="main-content">
<div class="container-fluid p-4">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="mb-0">Resumo de Planejamento</h2>
        <a th:href="@{/quadro-planejamento}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-table me-1"></i> Ver Quadros por Coleção
        </a>
    </div>

    <!-- INVERNO -->
    <div th:if="${!#lists.isEmpty(invernos)}" class="mb-5">
        <h5 class="text-uppercase fw-bold mb-3" style="letter-spacing:0.08em; color:#1a1a2e;">
            <i class="bi bi-snow me-2"></i>Inverno
        </h5>
        <div class="row g-3">
            <div th:each="card : ${invernos}" class="col-md-3 col-sm-6">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-dark text-white text-center py-2">
                        <strong th:text="${card.colecao}" style="font-size:0.9rem"></strong>
                    </div>
                    <div class="card-body text-center py-3">
                        <div class="row g-2">
                            <div class="col-4">
                                <div class="p-2 rounded" style="background:#fff8e1">
                                    <div class="fw-bold text-warning" style="font-size:1.4rem" th:text="${card.cotado}">0</div>
                                    <div style="font-size:0.7rem; color:#888">Cotado</div>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="p-2 rounded" style="background:#e8f5e9">
                                    <div class="fw-bold text-success" style="font-size:1.4rem" th:text="${card.aprovado}">0</div>
                                    <div style="font-size:0.7rem; color:#888">Aprovado</div>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="p-2 rounded" style="background:#ffebee">
                                    <div class="fw-bold text-danger" style="font-size:1.4rem" th:text="${card.cancelado}">0</div>
                                    <div style="font-size:0.7rem; color:#888">Cancelado</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-white text-center border-top-0 pb-3">
                        <a th:href="@{/quadro-planejamento(colecao=${card.colecao})}"
                           class="btn btn-sm btn-outline-dark px-3">
                            <i class="bi bi-table me-1"></i> Ver Quadro
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- VERÃO -->
    <div th:if="${!#lists.isEmpty(veraos)}" class="mb-5">
        <h5 class="text-uppercase fw-bold mb-3" style="letter-spacing:0.08em; color:#1a1a2e;">
            <i class="bi bi-sun me-2"></i>Verão
        </h5>
        <div class="row g-3">
            <div th:each="card : ${veraos}" class="col-md-3 col-sm-6">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header text-white text-center py-2" style="background:#e65100">
                        <strong th:text="${card.colecao}" style="font-size:0.9rem"></strong>
                    </div>
                    <div class="card-body text-center py-3">
                        <div class="row g-2">
                            <div class="col-4">
                                <div class="p-2 rounded" style="background:#fff8e1">
                                    <div class="fw-bold text-warning" style="font-size:1.4rem" th:text="${card.cotado}">0</div>
                                    <div style="font-size:0.7rem; color:#888">Cotado</div>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="p-2 rounded" style="background:#e8f5e9">
                                    <div class="fw-bold text-success" style="font-size:1.4rem" th:text="${card.aprovado}">0</div>
                                    <div style="font-size:0.7rem; color:#888">Aprovado</div>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="p-2 rounded" style="background:#ffebee">
                                    <div class="fw-bold text-danger" style="font-size:1.4rem" th:text="${card.cancelado}">0</div>
                                    <div style="font-size:0.7rem; color:#888">Cancelado</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-white text-center border-top-0 pb-3">
                        <a th:href="@{/quadro-planejamento(colecao=${card.colecao})}"
                           class="btn btn-sm btn-outline-dark px-3">
                            <i class="bi bi-table me-1"></i> Ver Quadro
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Nenhuma coleção -->
    <div th:if="${#lists.isEmpty(invernos) && #lists.isEmpty(veraos)}" class="text-center py-5 text-muted">
        <i class="bi bi-inbox" style="font-size:3rem"></i>
        <p class="mt-3">Nenhuma coleção cadastrada ainda.</p>
        <a th:href="@{/quadro-planejamento}" class="btn btn-primary">Criar primeira coleção</a>
    </div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
